# Ana Nginx — kenar sunucuda TLS sonlandırması Cloudflare veya bu sunucuda olabilir.
# Öneri: TLS 1.2+ only, OCSP stapling, dhparam (üretimde ayrı dosya).

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;

    # Boyut sınırları (yüklemeler API katmanında ayrıca sınırlandırılmalı)
    client_max_body_size 25m;
    client_body_buffer_size 128k;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=30r/s;

    include /etc/nginx/conf.d/*.conf;
}
