# Örnek kenar yapılandırması — alan adlarını ve upstream'i ortamınıza göre düzenleyin.
# API: FastAPI uvicorn genelde http://127.0.0.1:8000 veya iç Docker servis adı.

upstream turkdamga_api {
    least_conn;
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS yönlendirme (TLS bu sunucuda sonlanıyorsa)
server {
    listen 80;
    listen [::]:80;
    server_name turkdamga.app www.turkdamga.app api.turkdamga.app;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.turkdamga.app;

    # ssl_certificate /etc/letsencrypt/live/api.turkdamga.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.turkdamga.app/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/api.turkdamga.app/chain.pem;

    # Genel güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://turkdamga_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turkdamga.app www.turkdamga.app;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    root /var/www/turkdamga-static;
    index turkdamga-landing.html;

    location / {
        limit_req zone=api_burst burst=50 nodelay;
        try_files $uri $uri/ /turkdamga-landing.html;
    }

    location ~* \.(html|css|js|woff2?|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
